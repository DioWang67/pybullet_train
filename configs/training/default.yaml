# 默認訓練配置基線
# 適用於 Cassie 和 H1

algorithm: SAC

# ── SAC 超參數 ──────────────────────────────────────────────────────────────
sac:
  learning_rate: 3.0e-4           # 策略 + 價值網路學習率
  buffer_size: 1_000_000          # 回放緩衝容量
  batch_size: 256                 # 訓練批次大小
  tau: 0.005                       # 軟更新率 (1 - tau) * old + tau * new
  gamma: 0.99                      # 折扣因子
  train_freq: 1                    # 每步環境後的訓練更新次數
  gradient_steps: 1                # 每個 train_freq 中的梯度步
  net_arch: [400, 300]            # MLP 隱層紀構 (Actor-Critic)
  use_sde: false                   # 不使用狀態相依探索

# ── 環境並行化 ──────────────────────────────────────────────────────────────
n_envs: 8                          # 並行訓練環境數

# ── 向量化環境歸一化 ────────────────────────────────────────────────────────
vecnormalize:
  norm_obs: true                   # 歸一化觀測
  norm_reward: true                # 訓練時歸一化獎勵
  clip_obs: 10.0                   # 觀測值裁剪 [-10, 10]

# ── 訓練迴圈 ────────────────────────────────────────────────────────────────
total_timesteps: 5_000_000         # 訓練 500 萬步

# ── 回調參數 ────────────────────────────────────────────────────────────────
callbacks:
  checkpoint_save_freq: 100_000    # 每 10 萬步保存檢查點
  eval_freq: 50_000                # 每 5 萬步評估一次
  n_eval_episodes: 5               # 每次評估 5 個 episodes
  progress_print_freq: 10_000      # 每 1 萬步列印進度

# ── 目錄 ────────────────────────────────────────────────────────────────────
model_dir: "models"                # 模型保存位置
log_dir: "logs"                    # 日誌位置

# ── 控制標誌 ────────────────────────────────────────────────────────────────
resume: false                       # 是否從檢查點恢復
render: false                       # 訓練時是否渲染
seed: 42                            # 隨機種子
use_simulation: true                # 使用模擬環境

# ── 元資料 ──────────────────────────────────────────────────────────────────
metadata:
  name: "default"
  description: "基線訓練配置 - 通用於 Cassie 和 H1"
  created_date: "2026-04-01"
